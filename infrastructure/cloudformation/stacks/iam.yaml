AWSTemplateFormatVersion: "2010-09-09"
Description: "RideStream v2 — IAM roles (least-privilege per service)"

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

Resources:
  # MSK Broker Role
  MSKBrokerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ridestream-msk-broker-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: kafka.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: MSKBrokerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/msk/*"

  # Kinesis Firehose Role
  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ridestream-firehose-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FirehosePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::ridestream-bronze-${Environment}"
                  - !Sub "arn:aws:s3:::ridestream-bronze-${Environment}/*"

  # EMR Serverless Job Role
  EMRJobRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ridestream-emr-job-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EMRJobPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::ridestream-*-${Environment}"
                  - !Sub "arn:aws:s3:::ridestream-*-${Environment}/*"
              - Effect: Allow
                Action:
                  - glue:GetDatabase
                  - glue:GetTable
                  - glue:GetPartitions
                Resource: "*"

  # CodeBuild Role
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ridestream-codebuild-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "arn:aws:s3:::ridestream-artifacts-${Environment}/*"

  # Glue Crawler Role
  GlueCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ridestream-glue-crawler-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: GlueS3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::ridestream-*-${Environment}"
                  - !Sub "arn:aws:s3:::ridestream-*-${Environment}/*"

Outputs:
  MSKBrokerRoleArn:
    Value: !GetAtt MSKBrokerRole.Arn
    Export:
      Name: !Sub "RideStream-MSKBrokerRole-${Environment}"
  FirehoseRoleArn:
    Value: !GetAtt FirehoseRole.Arn
    Export:
      Name: !Sub "RideStream-FirehoseRole-${Environment}"
  EMRJobRoleArn:
    Value: !GetAtt EMRJobRole.Arn
    Export:
      Name: !Sub "RideStream-EMRJobRole-${Environment}"
  CodeBuildRoleArn:
    Value: !GetAtt CodeBuildRole.Arn
    Export:
      Name: !Sub "RideStream-CodeBuildRole-${Environment}"
  GlueCrawlerRoleArn:
    Value: !GetAtt GlueCrawlerRole.Arn
    Export:
      Name: !Sub "RideStream-GlueCrawlerRole-${Environment}"
