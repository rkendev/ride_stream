version: 0.2

# RideStream v2 — CodeBuild pipeline (ADR-010, ADR-011)
# Max runtime: 30 minutes
# Mandatory gates: lint, type-check, security, unit tests, dbt parse, smoke tests

env:
  variables:
    PYTHON_VERSION: "3.12"
    RIDESTREAM_PROFILE: "ci"

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "=== INSTALL ==="
      - python -m pip install --upgrade pip
      - pip install uv || true
      - if command -v uv >/dev/null 2>&1; then uv pip install --system -e ".[dev]"; else pip install -e ".[dev]" -q; fi

  pre_build:
    commands:
      - echo "=== PRE-BUILD CHECKS ==="
      - bash scripts/verify-versions.sh
      - echo "Verifying Docker image tags..."
      - bash scripts/verify-images.sh || echo "WARN: Image verification requires Docker (skipped in CodeBuild w/o privileged mode)"
      - echo "Validating CloudFormation templates..."
      - |
        for f in infrastructure/cloudformation/stacks/*.yaml infrastructure/cloudformation/*.yaml; do
          echo "  Validating $f..."
          aws cloudformation validate-template --template-body file://$f || exit 1
        done
      - echo "Validating Step Functions ASL..."
      - python3 -c "import json; json.load(open('infrastructure/cloudformation/step_functions.asl.json')); print('ASL: valid JSON')"

  build:
    commands:
      - echo "=== LINT ==="
      - ruff check src/ tests/
      - ruff format --check src/ tests/
      - echo "=== TYPE-CHECK ==="
      - mypy src/ridestream/
      - echo "=== SECURITY ==="
      - bandit -r src/ -ll -q
      - echo "=== UNIT TESTS ==="
      - pytest tests/unit/ -v --cov=src/ridestream --cov-report=xml --cov-report=term
      - echo "=== dbt PARSE ==="
      - cd dbt && dbt parse --profiles-dir . && cd ..
      - echo "=== INTEGRATION TESTS (Docker-gated) ==="
      - |
        if [ "$CODEBUILD_PRIVILEGED_MODE" = "true" ]; then
          docker compose -f docker/docker-compose.yml up -d
          sleep 60
          pytest tests/integration/ -v
          docker compose -f docker/docker-compose.yml down -v
        else
          echo "WARN: Integration tests skipped (privileged mode required)"
        fi

  post_build:
    commands:
      - echo "=== POST-BUILD ==="
      - echo "Build completed on $(date)"
      - if [ -f coverage.xml ]; then echo "Coverage report generated."; fi

artifacts:
  files:
    - "**/*"
  name: ridestream-build-$(date +%Y%m%d%H%M%S)
  exclude-paths:
    - ".venv/**/*"
    - ".pytest_cache/**/*"
    - ".ruff_cache/**/*"
    - ".mypy_cache/**/*"
    - "**/__pycache__/**/*"
    - "dbt/target/**/*"
    - "dbt/logs/**/*"
    - "volumes/**/*"

reports:
  pytest:
    files:
      - "coverage.xml"
    base-directory: .
    file-format: COBERTURAXML

cache:
  paths:
    - "/root/.cache/pip/**/*"
    - "/root/.cache/uv/**/*"
