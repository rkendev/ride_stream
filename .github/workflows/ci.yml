name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv sync --dev
          uv tool install ruff@0.8.0
          uv tool install bandit@1.8.0

      - name: Lint (ruff)
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Type check (mypy)
        run: uv run mypy src/ridestream/ --ignore-missing-imports

      - name: Security scan (bandit)
        run: bandit -r src/ -ll -q

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short -m "not integration and not aws"

  validate-cfn:
    name: CloudFormation Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (dry-run only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        continue-on-error: true

      - name: Validate CloudFormation templates
        run: |
          for template in infrastructure/cloudformation/stacks/*.yaml; do
            echo "Validating $template..."
            aws cloudformation validate-template \
              --template-body "file://$template" \
              --region us-east-1 2>/dev/null || echo "⚠ Skipped (no AWS credentials)"
            done
        continue-on-error: true

  dbt-parse:
    name: dbt Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Validate dbt models
        run: |
          cd dbt
          uv run dbt parse --profiles-dir . --target dev 2>/dev/null || echo "⚠ dbt parse requires active profile connection"
        continue-on-error: true
